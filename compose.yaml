# crate-net is shared with the separate `vault` container (see ~/dev/vault)
# so `vault status` / varlock's HashiCorp Vault plugin can reach it at
# http://vault:8200 by container name. Created once, out-of-band, by either
# stack's launchd job (idempotent `docker network create`) — see README.
networks:
  crate-net:
    external: true

services:
  crate:
    build:
      context: .
      args:
        UID: ${UID}
        GID: ${GID}
        USERNAME: crate
        CORP_CA_B64: ${CORP_CA_B64:-}
    image: crate:latest
    container_name: crate          # fixed name — docker exec crate bash always works
    hostname: crate
    stdin_open: true
    tty: true
    init: true
    restart: unless-stopped        # survive reboots; launchd starts Colima, Docker restarts crate
    networks:
      - crate-net
    ports:
      - "19876:19876"   # opencode MCP OAuth callback
      - "8976:8976"     # wrangler login callback
    volumes:
      - ~/docker-home:/home/crate
      - ~/dev:/home/crate/dev
      # Corporate CA cert — optional. Place your cert at ~/docker-home/.corp-ca.pem
      # on the host. entrypoint.sh installs it into the system trust store at startup.
      # Without it, TLS-intercepting proxies (Cloudflare WARP, Zscaler, etc.) will fail.
    environment:
      GITLAB_HOST: gitlab.cfdata.org
      VAULT_ADDR: http://vault:8200
    working_dir: /home/crate
