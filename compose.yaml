services:
  crate:
    build:
      context: .
      args:
        UID: ${UID}
        GID: ${GID}
        USERNAME: crate
    image: crate:latest
    container_name: crate          # fixed name — docker exec crate bash always works
    hostname: crate
    stdin_open: true
    tty: true
    init: true
    restart: unless-stopped        # survive reboots; launchd starts Docker, Docker restarts crate
    ports:
      - "127.0.0.1:19876:19876"   # opencode MCP OAuth callback
      - "127.0.0.1:8976:8976"     # wrangler login callback
      # Node tools in the container are forced to IPv4 via NODE_OPTIONS
      # (--dns-result-order=ipv4first) — see Dockerfile. This sidesteps
      # OrbStack's flaky IPv6 forwarding.
    volumes:
      - ~/docker-home:/home/crate
      - ~/dev:/home/crate/dev
    environment:
      GITLAB_HOST: gitlab.cfdata.org
    working_dir: /home/crate
